<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f7f7f7;
        }

        h1 {
            margin-bottom: 10px;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 15px;
            align-items: end;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #bbb;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 16px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .secondary-btn {
            background: #64748b;
        }

        .secondary-btn:hover {
            background: #475569;
        }

        .action-btn {
            background: #16a34a;
        }

        .action-btn:hover {
            background: #15803d;
        }

        .history-btn {
            background: #7c3aed;
        }

        .history-btn:hover {
            background: #6d28d9;
        }

        .edit-btn {
            background: #f59e0b;
        }

        .edit-btn:hover {
            background: #d97706;
        }

        .save-btn {
            background: #16a34a;
        }

        .save-btn:hover {
            background: #15803d;
        }

        .table-wrap {
            max-height: 650px;
            overflow-y: auto;
            overflow-x: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1300px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            white-space: nowrap;
            vertical-align: top;
        }

        th {
            background: #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .inline-payment-box {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: end;
            margin-top: 8px;
        }

        .payment-row {
            background: #fafafa;
        }

        .small-text {
            color: #666;
            font-size: 13px;
        }

        .history-box {
            margin-top: 8px;
            padding: 10px;
            background: #f8fafc;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .customer-edit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }

        .payment-edit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: end;
            margin-top: 8px;
        }

        .pagination-box {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        @media (max-width: 1000px) {
            .search-grid {
                grid-template-columns: 1fr;
            }

            .inline-payment-box,
            .customer-edit-grid,
            .payment-edit-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>Collection / Payment Entry</h1>
    <p><a href="/">Back to Home</a></p>

    <div class="card">
        <h2>Search Customer</h2>
        <div class="search-grid">
            <div>
                <label for="search_customer_id">Customer ID</label>
                <input type="number" id="search_customer_id" placeholder="Enter customer ID">
            </div>

            <div>
                <label for="search_collector_id">Collector</label>
                <select id="search_collector_id">
                    <option value="">Select collector</option>
                </select>
            </div>

            <div>
                <button id="searchBtn" type="button">Search</button>
            </div>

            <div>
                <button type="button" id="showAllBtn" class="secondary-btn">Show All</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Search Results</h2>
        <p class="small-text">Add payment, edit customer data, and edit payment history from this page.</p>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Customer ID</th>
                        <th>Customer Name</th>
                        <th>Customer Address</th>
                        <th>Customer Phone</th>
                        <th>Collector</th>
                        <th>Last Payment</th>
                        <th>Last Payment Date</th>
                        <th>Balance</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody"></tbody>
            </table>
        </div>

        <div id="paginationBox" class="pagination-box">
            <button type="button" id="prevPageBtn" class="secondary-btn">Previous</button>
            <span id="pageInfo">Page 0 of 0 | Total: 0</span>
            <button type="button" id="nextPageBtn" class="secondary-btn">Next</button>
        </div>
    </div>

    <script>
        const customerIdInput = document.getElementById("search_customer_id");
        const collectorSelect = document.getElementById("search_collector_id");
        const searchBtn = document.getElementById("searchBtn");
        const showAllBtn = document.getElementById("showAllBtn");
        const resultsTableBody = document.getElementById("resultsTableBody");
        const prevPageBtn = document.getElementById("prevPageBtn");
        const nextPageBtn = document.getElementById("nextPageBtn");
        const pageInfo = document.getElementById("pageInfo");

        let collectorsCache = [];
        let currentPage = 1;
        let totalPages = 0;
        let currentShowAll = false;
        const pageLimit = 20;

        async function loadCollectors() {
            try {
                const res = await fetch("/payments/collectors");
                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Failed to load collectors");
                    return;
                }

                collectorsCache = data;
                collectorSelect.innerHTML = `<option value="">Select collector</option>`;

                data.forEach(collector => {
                    collectorSelect.innerHTML += `
                        <option value="${collector.id}">
                            ${collector.id} - ${collector.name}
                        </option>
                    `;
                });
            } catch (error) {
                console.log(error);
                alert("Could not load collectors");
            }
        }

        function getTodayDate() {
            return new Date().toISOString().split("T")[0];
        }

        async function searchRecords(page = 1, showAll = currentShowAll) {
            const customer_id = customerIdInput.value.trim();
            const collector_id = collectorSelect.value;

            currentPage = page;
            currentShowAll = showAll;

            const hasFilter = !!customer_id || !!collector_id;

            if (!hasFilter && !showAll) {
                renderResults([]);
                updatePagination({
                    page: 0,
                    totalPages: 0,
                    total: 0
                });
                return;
            }

            const params = new URLSearchParams();

            if (customer_id) {
                params.append("customer_id", customer_id);
            }

            if (collector_id) {
                params.append("collector_id", collector_id);
            }

            params.append("page", currentPage);
            params.append("limit", pageLimit);
            params.append("show_all", showAll ? "true" : "false");

            try {
                const res = await fetch(`/payments/search?${params.toString()}`);
                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Failed to search records");
                    return;
                }

                renderResults(data.rows || []);
                updatePagination(data.pagination || {
                    page: 0,
                    totalPages: 0,
                    total: 0
                });
            } catch (error) {
                console.log(error);
                alert("Could not search records");
            }
        }

        function updatePagination(pagination) {
            currentPage = pagination.page || 0;
            totalPages = pagination.totalPages || 0;

            pageInfo.textContent = `Page ${currentPage} of ${totalPages} | Total: ${pagination.total || 0}`;

            prevPageBtn.disabled = currentPage <= 1;
            nextPageBtn.disabled = totalPages === 0 || currentPage >= totalPages;
        }

        function collectorOptionsHtml(selectedId) {
            let html = `<option value="">Select collector</option>`;

            collectorsCache.forEach(collector => {
                const selected = String(collector.id) === String(selectedId) ? "selected" : "";
                html += `<option value="${collector.id}" ${selected}>${collector.id} - ${collector.name}</option>`;
            });

            return html;
        }

        function renderResults(data) {
            resultsTableBody.innerHTML = "";

            if (data.length === 0) {
                resultsTableBody.innerHTML = `
                    <tr>
                        <td colspan="9">No matching records found.</td>
                    </tr>
                `;
                return;
            }

            data.forEach((row) => {
                resultsTableBody.innerHTML += `
                    <tr>
                        <td>${row.customer_id}</td>
                        <td>${row.customer_name}</td>
                        <td>${row.customer_address || ""}</td>
                        <td>${row.customer_phone || ""}</td>
                        <td>${row.collector_name || ""}</td>
                        <td>${row.last_payment_amount ?? ""}</td>
                        <td>${row.last_payment_date ?? ""}</td>
                        <td>${row.balance}</td>
                        <td>
                            <button class="action-btn" type="button" onclick="togglePaymentForm(${row.sale_id})">Add Payment</button>
                            <button class="history-btn" type="button" onclick="toggleHistory(${row.sale_id})">History</button>
                            <button class="edit-btn" type="button" onclick="toggleCustomerEdit(${row.customer_id})">Edit Customer</button>
                        </td>
                    </tr>

                    <tr id="customer-edit-row-${row.customer_id}" class="payment-row" style="display:none;">
                        <td colspan="9">
                            <div class="customer-edit-grid">
                                <div>
                                    <label>Customer Name</label>
                                    <input type="text" id="customer-name-${row.customer_id}" value="${row.customer_name || ""}">
                                </div>

                                <div>
                                    <label>Customer Address</label>
                                    <input type="text" id="customer-address-${row.customer_id}" value="${row.customer_address || ""}">
                                </div>

                                <div>
                                    <label>Customer Phone</label>
                                    <input type="text" id="customer-phone-${row.customer_id}" value="${row.customer_phone || ""}">
                                </div>

                                <div>
                                    <label>Collector</label>
                                    <select id="customer-collector-${row.customer_id}">
                                        ${collectorOptionsHtml(row.collector_id)}
                                    </select>
                                </div>

                                <div>
                                    <button class="save-btn" type="button" onclick="saveCustomerEdit(${row.customer_id})">Save Customer</button>
                                </div>
                            </div>
                        </td>
                    </tr>

                    <tr id="payment-row-${row.sale_id}" class="payment-row" style="display:none;">
                        <td colspan="9">
                            <div class="inline-payment-box">
                                <div>
                                    <label>Payment Amount</label>
                                    <input type="number" id="payment-amount-${row.sale_id}" min="0.01" step="0.01" placeholder="Enter payment amount">
                                </div>

                                <div>
                                    <label>Payment Date</label>
                                    <input type="date" id="payment-date-${row.sale_id}" value="${getTodayDate()}">
                                </div>

                                <div>
                                    <button class="action-btn" type="button" onclick="savePayment(${row.sale_id})">Save Payment</button>
                                </div>
                            </div>
                        </td>
                    </tr>

                    <tr id="history-row-${row.sale_id}" class="payment-row" style="display:none;">
                        <td colspan="9">
                            <div class="history-box" id="history-box-${row.sale_id}">
                                Loading payment history...
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function togglePaymentForm(saleId) {
            const row = document.getElementById(`payment-row-${saleId}`);
            row.style.display = row.style.display === "none" ? "table-row" : "none";
        }

        function toggleCustomerEdit(customerId) {
            const row = document.getElementById(`customer-edit-row-${customerId}`);
            row.style.display = row.style.display === "none" ? "table-row" : "none";
        }

        async function saveCustomerEdit(customerId) {
            const customer_name = document.getElementById(`customer-name-${customerId}`).value;
            const customer_address = document.getElementById(`customer-address-${customerId}`).value;
            const customer_phone = document.getElementById(`customer-phone-${customerId}`).value;
            const collector_id = document.getElementById(`customer-collector-${customerId}`).value;

            if (!customer_name || !customer_address || !customer_phone || !collector_id) {
                alert("Please complete customer name, address, phone, and collector");
                return;
            }

            try {
                const res = await fetch(`/payments/customer/${customerId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        customer_name,
                        customer_address,
                        customer_phone,
                        collector_id
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Failed to update customer");
                    return;
                }

                alert("Customer updated successfully");
                await searchRecords(currentPage, currentShowAll);
            } catch (error) {
                console.log(error);
                alert("Could not update customer");
            }
        }

        async function savePayment(saleId) {
            const amountInput = document.getElementById(`payment-amount-${saleId}`);
            const dateInput = document.getElementById(`payment-date-${saleId}`);

            const amount = amountInput.value;
            const payment_date = dateInput.value;

            if (!amount || !payment_date) {
                alert("Please enter payment amount and payment date");
                return;
            }

            try {
                const res = await fetch("/payments", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        sale_id: saleId,
                        amount,
                        payment_date
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Failed to save payment");
                    return;
                }

                alert("Payment recorded successfully");
                await searchRecords(currentPage, currentShowAll);
            } catch (error) {
                console.log(error);
                alert("Could not save payment");
            }
        }

        async function toggleHistory(saleId) {
            const row = document.getElementById(`history-row-${saleId}`);
            const box = document.getElementById(`history-box-${saleId}`);

            if (row.style.display === "none") {
                row.style.display = "table-row";

                try {
                    const res = await fetch(`/payments/history/${saleId}`);
                    const data = await res.json();

                    if (!res.ok) {
                        box.innerHTML = data.message || "Failed to load history";
                        return;
                    }

                    if (data.length === 0) {
                        box.innerHTML = "No payment history.";
                        return;
                    }

                    let html = `
                        <table style="width:100%; border-collapse:collapse;">
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">Customer ID</th>
                                    <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">Amount</th>
                                    <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">Payment Date</th>
                                    <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">Type</th>
                                    <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.forEach(payment => {
                        html += `
                            <tr>
                                <td style="padding:6px; border-bottom:1px solid #eee;">${payment.customer_id}</td>
                                <td style="padding:6px; border-bottom:1px solid #eee;">${payment.amount}</td>
                                <td style="padding:6px; border-bottom:1px solid #eee;">${payment.payment_date}</td>
                                <td style="padding:6px; border-bottom:1px solid #eee;">${payment.payment_type}</td>
                                <td style="padding:6px; border-bottom:1px solid #eee;">
                                    <button class="edit-btn" type="button" onclick="togglePaymentEdit(${payment.payment_id})">Edit Payment</button>
                                </td>
                            </tr>

                            <tr id="history-edit-row-${payment.payment_id}" style="display:none;">
                                <td colspan="5" style="padding:10px; background:#f8fafc;">
                                    <div class="payment-edit-grid">
                                        <div>
                                            <label>Amount</label>
                                            <input type="number" id="history-amount-${payment.payment_id}" min="0.01" step="0.01" value="${payment.amount}">
                                        </div>

                                        <div>
                                            <label>Payment Date</label>
                                            <input type="date" id="history-date-${payment.payment_id}" value="${payment.payment_date}">
                                        </div>

                                        <div>
                                            <label>Type</label>
                                            <select id="history-type-${payment.payment_id}">
                                                <option value="regular" ${payment.payment_type === "regular" ? "selected" : ""}>regular</option>
                                                <option value="downpayment" ${payment.payment_type === "downpayment" ? "selected" : ""}>downpayment</option>
                                            </select>
                                        </div>

                                        <div>
                                            <button class="save-btn" type="button" onclick="saveHistoryPayment(${payment.payment_id})">Save Payment Edit</button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });

                    html += `</tbody></table>`;
                    box.innerHTML = html;
                } catch (error) {
                    console.log(error);
                    box.innerHTML = "Could not load payment history.";
                }
            } else {
                row.style.display = "none";
            }
        }

        function togglePaymentEdit(paymentId) {
            const row = document.getElementById(`history-edit-row-${paymentId}`);
            row.style.display = row.style.display === "none" ? "table-row" : "none";
        }

        async function saveHistoryPayment(paymentId) {
            const amount = document.getElementById(`history-amount-${paymentId}`).value;
            const payment_date = document.getElementById(`history-date-${paymentId}`).value;
            const payment_type = document.getElementById(`history-type-${paymentId}`).value;

            if (!amount || !payment_date || !payment_type) {
                alert("Please complete amount, payment date, and type");
                return;
            }

            try {
                const res = await fetch(`/payments/history/${paymentId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        amount,
                        payment_date,
                        payment_type
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Failed to update payment");
                    return;
                }

                alert("Payment updated successfully");
                await searchRecords(currentPage, currentShowAll);
            } catch (error) {
                console.log(error);
                alert("Could not update payment");
            }
        }

        searchBtn.addEventListener("click", () => {
            currentShowAll = false;
            searchRecords(1, false);
        });

        showAllBtn.addEventListener("click", async () => {
            customerIdInput.value = "";
            collectorSelect.value = "";
            await searchRecords(1, true);
        });

        prevPageBtn.addEventListener("click", () => {
            if (currentPage > 1) {
                searchRecords(currentPage - 1, currentShowAll);
            }
        });

        nextPageBtn.addEventListener("click", () => {
            if (currentPage < totalPages) {
                searchRecords(currentPage + 1, currentShowAll);
            }
        });

        loadCollectors();
        renderResults([]);
        updatePagination({
            page: 0,
            totalPages: 0,
            total: 0
        });
    </script>
</body>
</html>
