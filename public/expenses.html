<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 18px;
            background: #f5f7fb;
        }

        h1 {
            margin-bottom: 8px;
        }

        a {
            color: #4f46e5;
            text-decoration: none;
        }

        .page-wrap {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 18px;
            margin-top: 14px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #dcdfe6;
            border-radius: 12px;
            padding: 16px;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 14px;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #cfd5df;
            border-radius: 8px;
        }

        .field textarea {
            resize: vertical;
            min-height: 72px;
        }

        .summary-box {
            margin-top: 10px;
            background: #f3f4f6;
            border-radius: 10px;
            padding: 14px;
            font-weight: bold;
            font-size: 15px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 12px;
        }

        .table-wrap {
            max-height: 650px;
            overflow: auto;
            border: 1px solid #dcdfe6;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1250px;
            background: white;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #e9edf5;
            z-index: 2;
        }

        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px 8px;
            text-align: left;
            font-size: 13px;
            vertical-align: top;
        }

        tr:hover td {
            background: #fafafa;
        }

        .muted {
            color: #6b7280;
            margin-top: -6px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .mode-box {
            margin-bottom: 14px;
            padding: 10px 12px;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            border-radius: 8px;
            color: #3730a3;
            font-weight: bold;
        }

        @media (max-width: 1000px) {
            .page-wrap {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>Expenses</h1>
    <p><a href="/index.html">Back to Home</a></p>

    <div class="page-wrap">
        <div class="card">
            <h2>Input Expenses</h2>

            <div id="modeBox" class="mode-box" style="display:none;">
                Edit Mode
            </div>

            <form id="expenseForm">
                <input type="hidden" id="expense_id" />

                <div class="field">
                    <label for="expense_date">Date</label>
                    <input type="date" id="expense_date" required />
                </div>

                <div class="field">
                    <label for="driver_daily_wage">Driver Daily Wage</label>
                    <input type="number" id="driver_daily_wage" min="0" step="0.01" value="0" required />
                </div>

                <div class="field">
                    <label for="staffs_food_allowance">Staffs Food Allowance</label>
                    <input type="number" id="staffs_food_allowance" min="0" step="0.01" value="0" required />
                </div>

                <div class="field">
                    <label for="gasoline">Gasoline</label>
                    <input type="number" id="gasoline" min="0" step="0.01" value="0" required />
                </div>

                <div class="field">
                    <label for="miscellaneous">Miscellaneous</label>
                    <input type="number" id="miscellaneous" min="0" step="0.01" value="0" required />
                </div>

                <div class="field">
                    <label for="collector_id">Under whose collector</label>
                    <select id="collector_id" required>
                        <option value="">Select collector</option>
                    </select>
                </div>

                <div class="field">
                    <label for="route">Route</label>
                    <input type="text" id="route" placeholder="Example: Zone 1 / Barangay San Jose" />
                </div>

                <div class="field">
                    <label for="expense_type">Expense Type</label>
                    <select id="expense_type">
                        <option value="daily">daily</option>
                        <option value="special">special</option>
                    </select>
                </div>

                <div class="field">
                    <label for="notes">Notes</label>
                    <textarea id="notes" placeholder="Optional remarks"></textarea>
                </div>

                <div class="summary-box">
                    Total Expense: ₱<span id="totalExpensePreview">0.00</span>
                </div>

                <div class="btn-row">
                    <button type="submit" id="saveBtn" class="btn-primary">Save Expense</button>
                    <button type="button" id="cancelEditBtn" class="btn-secondary" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Expenses List</h2>
            <p class="muted">Scrollable table with edit and delete actions.</p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Collector</th>
                            <th>Driver Daily Wage</th>
                            <th>Staffs Food Allowance</th>
                            <th>Gasoline</th>
                            <th>Miscellaneous</th>
                            <th>Total Expense</th>
                            <th>Route</th>
                            <th>Expense Type</th>
                            <th>Notes</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTableBody">
                        <tr>
                            <td colspan="12">Loading expenses...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const expenseForm = document.getElementById("expenseForm");
        const expenseIdInput = document.getElementById("expense_id");
        const expenseDateInput = document.getElementById("expense_date");
        const driverInput = document.getElementById("driver_daily_wage");
        const foodInput = document.getElementById("staffs_food_allowance");
        const gasolineInput = document.getElementById("gasoline");
        const miscInput = document.getElementById("miscellaneous");
        const collectorSelect = document.getElementById("collector_id");
        const routeInput = document.getElementById("route");
        const expenseTypeInput = document.getElementById("expense_type");
        const notesInput = document.getElementById("notes");
        const totalExpensePreview = document.getElementById("totalExpensePreview");
        const expenseTableBody = document.getElementById("expenseTableBody");
        const modeBox = document.getElementById("modeBox");
        const saveBtn = document.getElementById("saveBtn");
        const cancelEditBtn = document.getElementById("cancelEditBtn");

        let expenses = [];

        function formatMoney(value) {
            return Number(value || 0).toFixed(2);
        }

        function computeTotal() {
            const driver = Number(driverInput.value) || 0;
            const food = Number(foodInput.value) || 0;
            const gas = Number(gasolineInput.value) || 0;
            const misc = Number(miscInput.value) || 0;

            const total = driver + food + gas + misc;
            totalExpensePreview.textContent = total.toFixed(2);
        }

        function setTodayDateIfEmpty() {
            if (!expenseDateInput.value) {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, "0");
                const dd = String(today.getDate()).padStart(2, "0");
                expenseDateInput.value = `${yyyy}-${mm}-${dd}`;
            }
        }

        function resetForm() {
            expenseForm.reset();
            expenseIdInput.value = "";
            driverInput.value = "0";
            foodInput.value = "0";
            gasolineInput.value = "0";
            miscInput.value = "0";
            expenseTypeInput.value = "daily";
            modeBox.style.display = "none";
            saveBtn.textContent = "Save Expense";
            cancelEditBtn.style.display = "none";
            setTodayDateIfEmpty();
            computeTotal();
        }

        async function loadCollectors() {
            try {
                const res = await fetch("/expenses/collectors");
                const data = await res.json();

                collectorSelect.innerHTML = `<option value="">Select collector</option>`;

                data.forEach((collector) => {
                    collectorSelect.innerHTML += `
                        <option value="${collector.id}">
                            ${collector.id} - ${collector.name}
                        </option>
                    `;
                });
            } catch (error) {
                console.error(error);
                alert("Could not load collectors");
            }
        }

        async function loadExpenses() {
            try {
                const res = await fetch("/expenses");
                const data = await res.json();
                expenses = data;

                if (!Array.isArray(data) || data.length === 0) {
                    expenseTableBody.innerHTML = `
                        <tr>
                            <td colspan="12">No expense records found.</td>
                        </tr>
                    `;
                    return;
                }

                expenseTableBody.innerHTML = data.map((item) => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.expense_date || ""}</td>
                        <td>${item.collector_name || ""}</td>
                        <td>${formatMoney(item.driver_daily_wage)}</td>
                        <td>${formatMoney(item.staffs_food_allowance)}</td>
                        <td>${formatMoney(item.gasoline)}</td>
                        <td>${formatMoney(item.miscellaneous)}</td>
                        <td>${formatMoney(item.total_expense)}</td>
                        <td>${item.route || ""}</td>
                        <td>${item.expense_type || ""}</td>
                        <td>${item.notes || ""}</td>
                        <td>
                            <button class="btn-small btn-warning" onclick="editExpense(${item.id})">Edit</button>
                            <button class="btn-small btn-danger" onclick="deleteExpense(${item.id})">Delete</button>
                        </td>
                    </tr>
                `).join("");
            } catch (error) {
                console.error(error);
                expenseTableBody.innerHTML = `
                    <tr>
                        <td colspan="12">Could not load expenses.</td>
                    </tr>
                `;
            }
        }

        window.editExpense = function(id) {
            const item = expenses.find(exp => Number(exp.id) === Number(id));

            if (!item) {
                alert("Expense not found");
                return;
            }

            expenseIdInput.value = item.id;
            expenseDateInput.value = item.expense_date || "";
            driverInput.value = item.driver_daily_wage || 0;
            foodInput.value = item.staffs_food_allowance || 0;
            gasolineInput.value = item.gasoline || 0;
            miscInput.value = item.miscellaneous || 0;
            collectorSelect.value = item.collector_id || "";
            routeInput.value = item.route || "";
            expenseTypeInput.value = item.expense_type || "daily";
            notesInput.value = item.notes || "";

            modeBox.style.display = "block";
            saveBtn.textContent = "Update Expense";
            cancelEditBtn.style.display = "inline-block";

            computeTotal();
            window.scrollTo({ top: 0, behavior: "smooth" });
        };

        window.deleteExpense = async function(id) {
            const confirmed = confirm("Are you sure you want to delete this expense?");

            if (!confirmed) return;

            try {
                const res = await fetch(`/expenses/${id}`, {
                    method: "DELETE"
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Failed to delete expense");
                    return;
                }

                alert("Expense deleted successfully");
                await loadExpenses();
                resetForm();
            } catch (error) {
                console.error(error);
                alert("Could not delete expense");
            }
        };

        expenseForm.addEventListener("submit", async function(e) {
            e.preventDefault();

            const payload = {
                expense_date: expenseDateInput.value,
                driver_daily_wage: driverInput.value,
                staffs_food_allowance: foodInput.value,
                gasoline: gasolineInput.value,
                miscellaneous: miscInput.value,
                collector_id: collectorSelect.value,
                route: routeInput.value,
                expense_type: expenseTypeInput.value,
                notes: notesInput.value
            };

            const expenseId = expenseIdInput.value;
            const isEdit = !!expenseId;

            try {
                const res = await fetch(
                    isEdit ? `/expenses/${expenseId}` : "/expenses",
                    {
                        method: isEdit ? "PUT" : "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    }
                );

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Failed to save expense");
                    return;
                }

                alert(isEdit ? "Expense updated successfully" : "Expense saved successfully");
                resetForm();
                await loadExpenses();
            } catch (error) {
                console.error(error);
                alert("Could not save expense");
            }
        });

        cancelEditBtn.addEventListener("click", function() {
            resetForm();
        });

        [driverInput, foodInput, gasolineInput, miscInput].forEach(input => {
            input.addEventListener("input", computeTotal);
        });

        setTodayDateIfEmpty();
        computeTotal();
        loadCollectors();
        loadExpenses();
    </script>
</body>
</html>
